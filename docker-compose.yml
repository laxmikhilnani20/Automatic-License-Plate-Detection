version: '3.8'

services:
  webapp:
    build: .
    container_name: anpr-webapp
    ports:
      - "5001:5000"
    volumes:
      - .:/app
    environment:
      - FLASK_ENV=development
    command: python WebbApp/app.py

  jupyter:
    build: .
    container_name: anpr-jupyter
    ports:
      - "8888:8888"
    volumes:
      - .:/app
    command: jupyter notebook --ip=0.0.0.0 --port=8888 --no-browser --allow-root
